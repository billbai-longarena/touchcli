# Ingress - HTTP(S) routing to services
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: touchcli-ingress
  namespace: touchcli
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - touchcli.io
    - api.touchcli.io
    secretName: touchcli-tls
  rules:
  - host: touchcli.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: api.touchcli.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
