# Kubernetes Secrets for sensitive data
# IMPORTANT: Replace with actual values in your cluster
# Use Sealed Secrets, HashiCorp Vault, or similar for production
apiVersion: v1
kind: Secret
metadata:
  name: touchcli-secrets
  namespace: touchcli
type: Opaque
stringData:
  DATABASE_URL: "postgresql://touchcli_user:PASSWORD@postgres:5432/touchcli_prod"
  REDIS_URL: "redis://:PASSWORD@redis:6379"
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  OPENAI_API_KEY: "sk-..."
  LANGGRAPH_API_KEY: "..."
  SENTRY_DSN: "https://..."
