# Backend Agent Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: touchcli
  labels:
    app: agent-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      initContainers:
      - name: migrate
        image: touchcli/agent-service:latest
        command: ["alembic", "upgrade", "head"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: touchcli-secrets
              key: DATABASE_URL
      containers:
      - name: agent-service
        image: touchcli/agent-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        envFrom:
        - configMapRef:
            name: touchcli-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: touchcli-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: touchcli-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: touchcli-secrets
              key: JWT_SECRET
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: touchcli-secrets
              key: OPENAI_API_KEY
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: touchcli
  labels:
    app: agent-service
spec:
  type: ClusterIP
  selector:
    app: agent-service
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
