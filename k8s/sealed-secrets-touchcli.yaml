# TouchCLI Sealed Secrets
#
# IMPORTANT: This file contains encrypted secrets and is SAFE to commit to Git.
# To create this file:
#
# 1. Create a Secret manifest (see example below)
# 2. Use kubeseal to encrypt it:
#    kubeseal -f secret.yaml -w sealed-secret.yaml --scope namespace
#
# 3. The Sealed Secrets controller in the cluster will automatically decrypt
#    these secrets when needed
#
# Reference: https://github.com/bitnami-labs/sealed-secrets
#
# Example unsealed secret (DO NOT COMMIT):
# apiVersion: v1
# kind: Secret
# metadata:
#   name: touchcli-secrets
#   namespace: touchcli
# type: Opaque
# stringData:
#   DATABASE_URL: "postgresql://touchcli_user:actual_password@postgres:5432/touchcli_prod"
#   REDIS_URL: "redis://:actual_password@redis:6379"
#   JWT_SECRET: "your-secret-jwt-key-here"
#   OPENAI_API_KEY: "sk-actual-api-key"
#   LANGGRAPH_API_KEY: "actual-langgraph-key"
#   SENTRY_DSN: "https://actual-sentry-dsn"

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: touchcli-secrets
  namespace: touchcli
spec:
  encryptedData:
    # ============================================================================
    # Database Configuration
    # ============================================================================
    DATABASE_URL: AgBvB3F...  # REPLACE: postgresql://user:pass@postgres:5432/touchcli_prod

    # ============================================================================
    # Cache Configuration
    # ============================================================================
    REDIS_URL: AgCkD7x...     # REPLACE: redis://:password@redis:6379

    # ============================================================================
    # Authentication
    # ============================================================================
    JWT_SECRET: AgDmE2y...    # REPLACE: Generate with: openssl rand -base64 32

    # ============================================================================
    # Third-Party Services
    # ============================================================================
    OPENAI_API_KEY: AgElF3z...      # REPLACE: sk-...
    LANGGRAPH_API_KEY: AgFmG4a...   # REPLACE: Actual LangGraph API key
    SENTRY_DSN: AgGnH5b...          # REPLACE: https://...@sentry.io/...

    # ============================================================================
    # Agent Service Configuration
    # ============================================================================
    AGENT_SERVICE_SECRET: AgHoI6c...  # REPLACE: Shared secret for agent service calls

  template:
    metadata:
      name: touchcli-secrets
      namespace: touchcli
    type: Opaque

---
# Secret rotation annotation (optional)
# Sealed Secrets can rotate keys periodically for additional security
apiVersion: v1
kind: ConfigMap
metadata:
  name: sealed-secrets-rotation
  namespace: touchcli
data:
  # Rotation policy: monthly rotation of encryption keys
  ROTATION_POLICY: "monthly"
  # Key version tracking
  KEY_VERSION: "1"
  # Last rotation date
  LAST_ROTATION: "2026-03-02T00:00:00Z"
