# 愿景
# 销售不需要"录入数据"。拍张名片、转发一段微信聊天、录一段语音备忘——
# Agent 自动理解内容，提取实体，关联到对应的客户/商机/联系人。
# 不是"帮我记一下"，而是 Agent 自动从行为中提取信息。

deliverables:
  - "语音语义分析：不只转写，还提取意图/实体/情绪/承诺/行动项"
  - "图片识别：名片 OCR → 自动创建联系人；白板拍照 → 结构化笔记"
  - "文件解析：PDF/Word/PPT → 提取产品信息、合同条款、客户需求"
  - "消息转发处理：用户转发微信聊天截图 → 提取互动要点"
  - "自动实体关联：从非结构化内容中识别客户/商机/联系人并自动关联"
  - "隐私控制面板：用户决定哪些信息被采集，哪些被忽略"

