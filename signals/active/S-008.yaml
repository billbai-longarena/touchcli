# 问题描述
# Go Gateway 的 WebSocket Hub 已搭建骨架，但 Agent 消息转发部分是 TODO stub。
# 前端 WebSocket client 已实现（自动重连、心跳），但消息无法真正流通到 Agent 并返回。
# 整条链路：Frontend WS → Go Gateway → Python Agent → Go Gateway → Frontend WS 需要贯通。

