  - "沟通风格画像：分析每个联系人的偏好（分析型/表达型、数据驱动/关系驱动）"
  - "关系趋势追踪：周级别的关系变化趋势图（上升/平稳/下降）"
  - "关系预警：健康度下降时主动提醒，并给出修复建议"
  - "影响力分析：识别关键人物和最短影响路径"

