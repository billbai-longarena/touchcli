deliverables:
  - "Sales Agent 演练模式：Agent 扮演客户角色（采购经理/技术负责人/CEO 等）"
  - "场景配置：基于真实客户数据生成演练场景（客户画像 + 商机阶段 + 历史互动）"
  - "角色定制：Agent 模拟不同性格（支持/中立/反对），不同关注点"
  - "演练评估：结束后 Agent 给出评价（话术评分 + 改进建议 + 关键时刻回顾）"
  - "对话式触发：'跟我练一下华为的项目' → Agent 进入角色 → 用户练习 → 评估"
  - "退出机制：用户说'结束演练'退出"

acceptance:
  - "用户说'练一下'→ Agent 询问场景 → 进入角色扮演"
  - "Agent 能扮演不同态度的客户（质疑/犹豫/积极）"
  - "演练结束后给出 3-5 条改进建议"
  - "演练对话不混入正常对话历史"

