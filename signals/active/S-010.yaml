# 问题描述
# DESIGN.md 7.2 定义了 7 种消息类型，当前只有纯文本（text）。
# 对话式 CRM 的关键体验在于：Agent 的回复不只是文字，还包含结构化卡片。

deliverables:
  - "entity_card 组件：客户/商机/联系人摘要卡片（名称+关键指标，可点击展开）"
  - "action_result 组件：操作结果状态（已创建/已修改/失败 + 实体摘要）"
  - "confirmation 组件：待确认操作（操作详情 + 确认/取消/修改按钮）"
  - "quick_replies 组件：建议回复 chip 列表（可点击发送）"
  - "chart_mini 组件：迷你数据可视化（漏斗/趋势/占比简图）"
  - "voice_note 组件：语音消息播放条 + 转写文字（预留，S-012 实现时启用）"
  - "消息渲染器：根据 content_type 字段自动选择组件"
  - "后端 message.content_type 和 message.metadata 格式定义"

acceptance:
  - "Agent 返回 entity_card 类型消息时，前端渲染为卡片而非纯文本"
  - "确认卡片的确认/取消按钮能触发对应操作"
  - "快捷回复 chip 点击后发送对应文本"
  - "所有卡片在移动端正确显示"

